<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>週次タスク整理ダッシュボード</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#1e3a5f',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; }
    .step-spinner {
      width: 14px; height: 14px; flex-shrink: 0;
      border: 2px solid #93c5fd; border-top-color: #2563eb;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .priority-badge { @apply text-[10px] font-bold px-2 py-0.5 rounded-full; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; padding: 10px 20px;
      border-radius: 8px; font-size: 13px; opacity: 0;
      transition: opacity 0.3s; pointer-events: none; z-index: 9999; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .card-hover { transition: box-shadow 0.15s, transform 0.15s; }
    .card-hover:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); transform: translateY(-1px); }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">

<!-- ════════════════ HEADER ════════════════ -->
<header class="bg-navy text-white px-5 py-3 flex items-center justify-between flex-shrink-0 shadow-md">
  <div class="flex items-center gap-3">
    <span class="text-lg font-bold tracking-wide">📋 タスク整理ダッシュボード</span>
    <span id="headerWeek" class="hidden text-sm text-white/60"></span>
  </div>
  <button id="headerCollectBtn"
    onclick="startCollect()"
    class="hidden items-center gap-2 bg-emerald-500 hover:bg-emerald-400 text-white text-sm font-semibold px-4 py-1.5 rounded-lg transition">
    ▶ 再収集
  </button>
</header>

<!-- ════════════════ PAGE: STANDBY ════════════════ -->
<div id="pageStandby" class="flex flex-1 flex-col items-center justify-center gap-8 p-8">

  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md flex flex-col gap-6">
    <div class="text-center">
      <div class="text-4xl mb-3">📋</div>
      <h1 class="text-xl font-bold text-slate-800">週次タスク整理</h1>
      <p class="text-sm text-slate-500 mt-1">Redmine・OneNote・メールを収集して<br>今週やるべきことをAIが整理します</p>
    </div>

    <!-- 対象週 -->
    <div class="flex items-center justify-between bg-slate-50 rounded-xl px-4 py-3 border border-slate-200">
      <button onclick="changeWeek(-1)" class="text-slate-400 hover:text-slate-700 text-lg px-2">‹</button>
      <div class="text-center">
        <div class="text-[11px] text-slate-400 mb-0.5">対象週</div>
        <div id="weekLabel" class="text-sm font-semibold text-slate-700"></div>
      </div>
      <button onclick="changeWeek(1)" id="nextWeekBtn" class="text-slate-400 hover:text-slate-700 text-lg px-2">›</button>
    </div>

    <!-- 設定サマリ -->
    <div class="flex flex-col gap-2 text-xs text-slate-500">
      <div class="flex items-center gap-2">
        <span class="text-red-400">🔴</span>
        <span>Redmine:</span>
        <span id="summaryRedmine" class="font-medium text-slate-700">my-team</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-purple-400">🟣</span>
        <span>OneNote:</span>
        <span id="summaryOneNote" class="font-medium text-slate-700">引き継ぎ</span>
      </div>
    </div>

    <!-- 収集ボタン -->
    <button id="collectBtn" onclick="startCollect()"
      class="w-full bg-emerald-500 hover:bg-emerald-400 active:scale-95 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition">
      <span id="collectBtnIcon">▶</span>
      <span id="collectBtnLabel">収集を開始する</span>
    </button>

    <button onclick="openSettings()" class="text-xs text-slate-400 hover:text-slate-600 text-center transition">⚙ 設定を変更する</button>
  </div>
</div>

<!-- ════════════════ PAGE: LOADING ════════════════ -->
<div id="pageLoading" class="hidden flex-1 flex-col items-center justify-center p-8 gap-6">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
    <div class="text-center mb-6">
      <div class="text-sm text-slate-500">収集中…</div>
      <div id="loadingWeekLabel" class="text-base font-bold text-slate-700 mt-1"></div>
    </div>
    <div id="dynStepContainer" class="flex flex-col gap-2"></div>
    <div class="mt-6 text-center">
      <button onclick="cancelCollect()"
        class="text-xs text-slate-400 hover:text-red-500 transition">✕ 収集を中断する</button>
    </div>
  </div>
</div>

<!-- ════════════════ PAGE: DASHBOARD ════════════════ -->
<div id="pageDashboard" class="hidden flex-1 flex-col gap-4 p-4 overflow-auto">

  <!-- 対象週バナー -->
  <div class="flex items-center justify-between bg-navy text-white rounded-xl px-5 py-3">
    <div>
      <div class="text-[11px] text-white/60">対象週</div>
      <div id="dashWeekLabel" class="font-bold text-base"></div>
    </div>
    <div class="text-[11px] bg-white/20 px-3 py-1 rounded-full">AI生成</div>
  </div>

  <!-- メインコンテンツ -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

    <!-- 左列：優先タスク -->
    <div class="flex flex-col gap-4">

      <!-- 今週やること -->
      <div class="bg-white rounded-xl shadow p-5 card-hover">
        <div class="flex items-center gap-2 mb-4">
          <span class="text-lg">🎯</span>
          <h2 class="font-bold text-slate-800">今週やること</h2>
          <span id="todoBadge" class="ml-auto text-[11px] bg-emerald-100 text-emerald-700 font-bold px-2 py-0.5 rounded-full"></span>
        </div>
        <div id="todoList" class="flex flex-col gap-2 text-sm text-slate-700"></div>
      </div>

      <!-- チームへの依頼候補 -->
      <div class="bg-white rounded-xl shadow p-5 card-hover">
        <div class="flex items-center gap-2 mb-4">
          <span class="text-lg">👥</span>
          <h2 class="font-bold text-slate-800">チームへの依頼候補</h2>
          <span id="delegateBadge" class="ml-auto text-[11px] bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded-full"></span>
        </div>
        <div id="delegateList" class="flex flex-col gap-2 text-sm text-slate-700"></div>
      </div>

    </div>

    <!-- 右列：Redmine・メール -->
    <div class="flex flex-col gap-4">

      <!-- 対応が必要なメール -->
      <div class="bg-white rounded-xl shadow p-5 card-hover">
        <div class="flex items-center gap-2 mb-4">
          <span class="text-lg">✉️</span>
          <h2 class="font-bold text-slate-800">対応が必要なメール</h2>
          <span id="emailBadge" class="ml-auto text-[11px] bg-amber-100 text-amber-700 font-bold px-2 py-0.5 rounded-full"></span>
        </div>
        <div id="emailList" class="flex flex-col gap-2 text-sm text-slate-700"></div>
      </div>

      <!-- Redmine 期限が近いチケット -->
      <div class="bg-white rounded-xl shadow p-5 card-hover">
        <div class="flex items-center gap-2 mb-4">
          <span class="text-lg">🔴</span>
          <h2 class="font-bold text-slate-800">Redmine チケット</h2>
          <span id="ticketBadge" class="ml-auto text-[11px] bg-red-100 text-red-700 font-bold px-2 py-0.5 rounded-full"></span>
        </div>
        <div id="ticketList" class="flex flex-col gap-2 text-sm text-slate-700"></div>
      </div>

    </div>
  </div>

  <!-- メモ欄 -->
  <div class="bg-white rounded-xl shadow p-5">
    <div class="flex items-center gap-2 mb-3">
      <span class="text-lg">📝</span>
      <h2 class="font-bold text-slate-800">AIの所見・懸念事項</h2>
    </div>
    <div id="concerns" class="text-sm text-slate-600 leading-relaxed whitespace-pre-line"></div>
  </div>

</div>

<!-- ════════════════ SETTINGS MODAL ════════════════ -->
<div id="settingsModal" class="hidden fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 flex flex-col gap-5"
       role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="flex items-center justify-between">
      <h2 id="settingsTitle" class="font-bold text-slate-800 text-base">⚙ 設定</h2>
      <button onclick="closeSettings()" class="text-slate-400 hover:text-slate-700 text-xl leading-none">×</button>
    </div>

    <!-- Redmine -->
    <div>
      <label class="text-xs font-semibold text-slate-500 block mb-1">Redmine プロジェクト</label>
      <div class="tag-wrap flex flex-wrap gap-1.5 p-2 border border-slate-300 rounded-lg bg-white cursor-text min-h-[38px]"
           id="redmineTagWrap" onclick="focusTagInput('redmineTagInput')">
        <input type="text" id="redmineTagInput" class="outline-none text-sm flex-1 min-w-[120px] bg-transparent"
               placeholder="プロジェクト名を入力してEnter"
               onkeydown="handleTagKey(event,'redmine')" />
      </div>
    </div>

    <!-- OneNote -->
    <div>
      <label class="text-xs font-semibold text-slate-500 block mb-1">OneNote ノートブック</label>
      <div class="tag-wrap flex flex-wrap gap-1.5 p-2 border border-slate-300 rounded-lg bg-white cursor-text min-h-[38px]"
           id="oneNoteTagWrap" onclick="focusTagInput('oneNoteTagInput')">
        <input type="text" id="oneNoteTagInput" class="outline-none text-sm flex-1 min-w-[120px] bg-transparent"
               placeholder="ノートブック名を入力してEnter"
               onkeydown="handleTagKey(event,'onenote')" />
      </div>
    </div>

    <div class="flex gap-3 pt-2">
      <button onclick="closeSettings()" class="flex-1 border border-slate-200 text-slate-600 text-sm py-2.5 rounded-xl hover:bg-slate-50 transition">キャンセル</button>
      <button onclick="saveSettings()" class="flex-1 bg-navy text-white text-sm font-bold py-2.5 rounded-xl hover:opacity-90 transition">保存</button>
    </div>
  </div>
</div>

<!-- ════════════════ CONFIRM MODAL ════════════════ -->
<div id="confirmModal" class="hidden fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 flex flex-col gap-4"
       role="dialog" aria-modal="true">
    <h3 id="confirmTitle" class="font-bold text-slate-800"></h3>
    <p id="confirmBody" class="text-sm text-slate-500"></p>
    <div class="flex gap-3 pt-1">
      <button onclick="closeConfirmModal()" class="flex-1 border border-slate-200 text-slate-600 text-sm py-2.5 rounded-xl hover:bg-slate-50 transition">戻る</button>
      <button id="confirmOkBtn" class="flex-1 text-white text-sm font-bold py-2.5 rounded-xl transition"></button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
  // ══════════════════════════════════════
  // 状態管理
  // ══════════════════════════════════════
  const state = {
    redmineProjects:  ['my-team'],
    oneNoteNotebooks: ['引き継ぎ'],
    collecting:  false,
    _sseSource:  null,
    _confirmCb:  null,
  };

  let weekOffset = 0;

  // Flask 起動時にサーバーの設定値でデフォルトを上書き
  fetch('/api/config')
    .then(r => r.ok ? r.json() : null)
    .then(cfg => {
      if (!cfg) return;
      if (cfg.redmineProjects?.length)  state.redmineProjects  = cfg.redmineProjects;
      if (cfg.oneNoteNotebooks?.length) state.oneNoteNotebooks = cfg.oneNoteNotebooks;
      renderAllTags();
      updateStandbySummary();
    })
    .catch(() => {});

  // ══════════════════════════════════════
  // 週選択
  // ══════════════════════════════════════
  function getWeekRange(offset) {
    const today = new Date();
    const mon = new Date(today);
    mon.setDate(today.getDate() - today.getDay() + (today.getDay() === 0 ? -6 : 1) + offset * 7);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const fmt = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    return `${fmt(mon)}〜${fmt(sun)}`;
  }

  function updateWeekDisplay() {
    const label = getWeekRange(weekOffset);
    document.getElementById('weekLabel').textContent = label;
    document.getElementById('nextWeekBtn').disabled = weekOffset >= 0;
    document.getElementById('nextWeekBtn').classList.toggle('opacity-30', weekOffset >= 0);
  }

  function changeWeek(delta) {
    if (weekOffset + delta > 0) return;
    weekOffset += delta;
    updateWeekDisplay();
  }

  updateWeekDisplay();

  // ══════════════════════════════════════
  // 設定サマリ更新
  // ══════════════════════════════════════
  function updateStandbySummary() {
    document.getElementById('summaryRedmine').textContent =
      state.redmineProjects.length ? state.redmineProjects.join('・') : '（未設定）';
    document.getElementById('summaryOneNote').textContent =
      state.oneNoteNotebooks.length ? state.oneNoteNotebooks.join('・') : '（未設定）';
  }

  // ══════════════════════════════════════
  // ページ切り替え
  // ══════════════════════════════════════
  function showPage(id) {
    ['pageStandby','pageLoading','pageDashboard'].forEach(p => {
      document.getElementById(p).classList.replace('flex','hidden');
    });
    document.getElementById(id).classList.replace('hidden','flex');
  }

  // ══════════════════════════════════════
  // 収集開始
  // ══════════════════════════════════════
  function startCollect() {
    if (state.collecting) return;
    if (state.redmineProjects.length === 0) { showToast('⚠ Redmineプロジェクトを1つ以上追加してください'); return; }

    state.collecting = true;
    setCollectBtnsDisabled(true);

    const weekLabel = getWeekRange(weekOffset);
    document.getElementById('loadingWeekLabel').textContent = weekLabel;
    document.getElementById('headerWeek').textContent = weekLabel;

    showPage('pageLoading');
    buildAndRunSteps();
  }

  function setCollectBtnsDisabled(disabled) {
    const btn = document.getElementById('collectBtn');
    const hBtn = document.getElementById('headerCollectBtn');
    btn.disabled = disabled;
    if (hBtn) hBtn.disabled = disabled;
    document.getElementById('collectBtnLabel').textContent = disabled ? '収集中…' : '収集を開始する';
    document.getElementById('collectBtnIcon').textContent  = disabled ? '' : '▶';
  }

  // ══════════════════════════════════════
  // ステップ動的生成
  // ══════════════════════════════════════
  function buildAndRunSteps() {
    const redmineLabel = state.redmineProjects.map(p => `「${p}」`).join('・');
    const oneNoteLabel = state.oneNoteNotebooks.length
      ? state.oneNoteNotebooks.map(n => `「${n}」`).join('・')
      : '（未設定）';

    const stepsData = [
      { icon: '🔴', label: 'Redmine チケット取得',   detail: `${redmineLabel} のチケットを取得中…`,   done: 'チケット取得完了' },
      { icon: '🟣', label: 'OneNote 業務リスト取得', detail: `${oneNoteLabel} の業務リストを取得中…`, done: '業務リスト取得完了' },
      { icon: '🟣', label: 'OneNote 日報 取得',      detail: `${oneNoteLabel} の日報を取得中…`,       done: '日報取得完了' },
      { icon: '✉️', label: 'メール 取得',            detail: '対応が必要なメールを取得中…',           done: 'メール取得完了' },
      { icon: '🔵', label: 'AI でタスク整理',        detail: 'データを解析・優先順位を整理中…',       done: 'タスク整理完了' },
    ];

    const container = document.getElementById('dynStepContainer');
    container.innerHTML = '';
    stepsData.forEach((s, i) => {
      const row = document.createElement('div');
      row.id = `dynStep${i}`;
      row.className = 'flex items-start gap-3 p-3 rounded-lg border bg-slate-50 border-slate-200';

      const iconEl = document.createElement('span');
      iconEl.className = 'text-base flex-shrink-0 mt-0.5';
      iconEl.textContent = s.icon;

      const info = document.createElement('div');
      info.className = 'flex-1 min-w-0';

      const lbl = document.createElement('p');
      lbl.className = 'text-sm font-semibold text-slate-700';
      lbl.textContent = s.label;

      const det = document.createElement('p');
      det.id = `dynDetail${i}`;
      det.className = 'text-[11px] text-slate-400 mt-0.5';
      det.textContent = i === 0 ? s.detail : '待機中';

      info.appendChild(lbl);
      info.appendChild(det);
      row.appendChild(iconEl);
      row.appendChild(info);

      if (i === 0) {
        const sp = document.createElement('div');
        sp.id = `dynSpin${i}`;
        sp.className = 'step-spinner';
        row.appendChild(sp);
      } else {
        const st = document.createElement('span');
        st.id = `dynStatus${i}`;
        st.className = 'text-base flex-shrink-0';
        st.textContent = '⏳';
        row.appendChild(st);
      }

      container.appendChild(row);
    });

    startRealCollect(stepsData);
  }

  // ══════════════════════════════════════
  // 実 API 接続
  // ══════════════════════════════════════
  async function startRealCollect(stepsData) {
    let res;
    try {
      res = await fetch('/api/collect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ weekOffset }),
      });
    } catch (e) {
      runDynStepsMock(stepsData);
      return;
    }
    if (!res.ok) {
      showToast('⚠ 収集の開始に失敗しました: ' + res.status);
      state.collecting = false;
      setCollectBtnsDisabled(false);
      showPage('pageStandby');
      return;
    }

    const source = new EventSource('/api/stream');
    state._sseSource = source;

    source.addEventListener('step', e => {
      const d = JSON.parse(e.data);
      _stepActivate(d.step - 1, stepsData[d.step - 1]);
    });
    source.addEventListener('step_done', e => {
      const d = JSON.parse(e.data);
      _stepDone(d.step - 1, stepsData[d.step - 1]);
    });
    source.addEventListener('done', e => {
      source.close(); state._sseSource = null;
      const d = JSON.parse(e.data);
      renderDashboard(d);
      state.collecting = false;
      setCollectBtnsDisabled(false);
      const hBtn = document.getElementById('headerCollectBtn');
      hBtn.classList.remove('hidden');
      hBtn.classList.add('flex');
      showPage('pageDashboard');
      showToast('✓ タスク整理が完了しました');
    });
    source.addEventListener('cancelled', e => {
      source.close(); state._sseSource = null;
      state.collecting = false;
      setCollectBtnsDisabled(false);
      showPage('pageStandby');
      showToast('収集を中断しました');
    });
    source.addEventListener('error', e => {
      let msg = '収集中にエラーが発生しました';
      try { msg = JSON.parse(e.data).message || msg; } catch (_) {}
      source.close(); state._sseSource = null;
      state.collecting = false;
      setCollectBtnsDisabled(false);
      showPage('pageStandby');
      showToast('⚠ ' + msg);
    });
    source.onerror = () => {
      if (source.readyState === EventSource.CLOSED) return;
      source.close(); state._sseSource = null;
      if (state.collecting) {
        state.collecting = false;
        setCollectBtnsDisabled(false);
        showPage('pageStandby');
        showToast('⚠ サーバーとの接続が切れました');
      }
    };
  }

  function _stepActivate(i, s) {
    const el = document.getElementById(`dynStep${i}`);
    const det = document.getElementById(`dynDetail${i}`);
    const stat = document.getElementById(`dynStatus${i}`);
    if (!el) return;
    el.classList.replace('bg-slate-50','bg-blue-50');
    el.classList.replace('border-slate-200','border-blue-200');
    if (det) det.textContent = s.detail;
    if (!document.getElementById(`dynSpin${i}`) && stat) {
      stat.textContent = '';
      const sp = document.createElement('div');
      sp.id = `dynSpin${i}`; sp.className = 'step-spinner';
      el.appendChild(sp);
    }
  }

  function _stepDone(i, s) {
    const el = document.getElementById(`dynStep${i}`);
    const det = document.getElementById(`dynDetail${i}`);
    const stat = document.getElementById(`dynStatus${i}`);
    const sp = document.getElementById(`dynSpin${i}`);
    if (!el) return;
    el.classList.replace('bg-blue-50','bg-green-50');
    el.classList.replace('border-blue-200','border-green-200');
    if (det) det.textContent = s.done;
    if (sp) sp.remove();
    if (stat) stat.textContent = '✅';
  }

  // Flask 未起動時のデモ用モック
  async function runDynStepsMock(stepsData) {
    for (let i = 0; i < stepsData.length; i++) {
      _stepActivate(i, stepsData[i]);
      await new Promise(r => setTimeout(r, 800 + Math.random() * 500));
      _stepDone(i, stepsData[i]);
    }
    await new Promise(r => setTimeout(r, 400));
    renderDashboard(_mockDashboardData());
    state.collecting = false;
    setCollectBtnsDisabled(false);
    const hBtn = document.getElementById('headerCollectBtn');
    hBtn.classList.remove('hidden');
    hBtn.classList.add('flex');
    showPage('pageDashboard');
    showToast('✓ タスク整理が完了しました（デモ）');
  }

  // ══════════════════════════════════════
  // ダッシュボード描画
  // ══════════════════════════════════════
  function renderDashboard(data) {
    document.getElementById('dashWeekLabel').textContent = data.weekLabel || getWeekRange(weekOffset);

    renderList('todoList',     'todoBadge',     data.todo      || [], 'priority');
    renderList('delegateList', 'delegateBadge', data.delegate  || [], 'delegate');
    renderList('emailList',    'emailBadge',    data.emails    || [], 'email');
    renderList('ticketList',   'ticketBadge',   data.tickets   || [], 'ticket');

    const concerns = document.getElementById('concerns');
    concerns.textContent = (data.concerns || []).join('\n') || '特になし';
  }

  function renderList(listId, badgeId, items, type) {
    const container = document.getElementById(listId);
    const badge = document.getElementById(badgeId);
    container.innerHTML = '';
    badge.textContent = items.length + '件';

    if (items.length === 0) {
      const empty = document.createElement('p');
      empty.className = 'text-slate-400 text-xs';
      empty.textContent = 'なし';
      container.appendChild(empty);
      return;
    }

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'flex items-start gap-2 p-2.5 rounded-lg bg-slate-50 border border-slate-100';

      // 優先度バッジ（todoリストのみ）
      if (type === 'priority' && item.priority) {
        const badge = document.createElement('span');
        const colorMap = { 高: 'bg-red-100 text-red-700', 中: 'bg-amber-100 text-amber-700', 低: 'bg-slate-100 text-slate-500' };
        badge.className = `priority-badge flex-shrink-0 mt-0.5 ${colorMap[item.priority] || colorMap['低']}`;
        badge.textContent = item.priority;
        row.appendChild(badge);
      }

      const text = document.createElement('span');
      text.className = 'text-sm text-slate-700 leading-snug';
      text.textContent = typeof item === 'string' ? item : item.text || item.subject || JSON.stringify(item);
      row.appendChild(text);

      container.appendChild(row);
    });
  }

  // ══════════════════════════════════════
  // 収集中断
  // ══════════════════════════════════════
  function cancelCollect() {
    if (!state.collecting) return;
    openConfirmModal(
      '収集を中断しますか？',
      '取得済みのデータは破棄されます。',
      'danger',
      () => {
        if (state._sseSource) { state._sseSource.close(); state._sseSource = null; }
        fetch('/api/collect', { method: 'DELETE' }).catch(() => {});
        state.collecting = false;
        setCollectBtnsDisabled(false);
        showPage('pageStandby');
        showToast('収集を中断しました');
      }
    );
  }

  // ══════════════════════════════════════
  // 設定モーダル
  // ══════════════════════════════════════
  function openSettings() {
    renderAllTags();
    const modal = document.getElementById('settingsModal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    trapFocus(modal);
  }

  function closeSettings() {
    const modal = document.getElementById('settingsModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
  }

  function saveSettings() {
    if (state.redmineProjects.length === 0) { showToast('⚠ Redmineプロジェクトを1つ以上入力してください'); return; }
    updateStandbySummary();
    closeSettings();
    showToast('✓ 設定を保存しました');
  }

  // ══════════════════════════════════════
  // タグ入力
  // ══════════════════════════════════════
  function focusTagInput(id) { document.getElementById(id)?.focus(); }

  function handleTagKey(e, type) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = e.target.value.trim().replace(/,$/, '');
      if (val) { addTag(type, val); e.target.value = ''; }
    } else if (e.key === 'Backspace' && e.target.value === '') {
      const arr = type === 'redmine' ? state.redmineProjects : state.oneNoteNotebooks;
      if (arr.length > 0) { arr.pop(); renderAllTags(); }
    }
  }

  function addTag(type, val) {
    const arr = type === 'redmine' ? state.redmineProjects : state.oneNoteNotebooks;
    if (arr.includes(val)) { showToast('すでに追加されています：' + val); return; }
    arr.push(val);
    renderAllTags();
  }

  function removeTag(type, idx) {
    (type === 'redmine' ? state.redmineProjects : state.oneNoteNotebooks).splice(idx, 1);
    renderAllTags();
  }

  function renderTags(wrapId, inputId, arr, type, bgClass, textClass) {
    const wrap  = document.getElementById(wrapId);
    const input = document.getElementById(inputId);
    if (!wrap || !input) return;
    wrap.querySelectorAll('.tag-chip').forEach(t => t.remove());
    arr.forEach((val, i) => {
      const chip = document.createElement('div');
      chip.className = `tag-chip flex items-center gap-1 ${bgClass} ${textClass} text-xs font-semibold px-2 py-0.5 rounded-full border`;
      const label = document.createElement('span'); label.textContent = val;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'text-current opacity-50 hover:opacity-100 text-sm leading-none ml-0.5';
      btn.setAttribute('aria-label', val + ' を削除');
      btn.textContent = '×';
      btn.onclick = () => removeTag(type, i);
      chip.appendChild(label); chip.appendChild(btn);
      wrap.insertBefore(chip, input);
    });
    input.placeholder = arr.length === 0
      ? (type === 'redmine' ? 'プロジェクト名を入力してEnter' : 'ノートブック名を入力してEnter')
      : '追加…';
  }

  function renderAllTags() {
    renderTags('redmineTagWrap', 'redmineTagInput', state.redmineProjects,  'redmine', 'bg-red-50 border-red-200',    'text-red-700');
    renderTags('oneNoteTagWrap', 'oneNoteTagInput', state.oneNoteNotebooks, 'onenote', 'bg-purple-50 border-purple-200', 'text-purple-700');
  }

  // ══════════════════════════════════════
  // 確認モーダル
  // ══════════════════════════════════════
  function openConfirmModal(title, body, variant, cb) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmBody').textContent  = body;
    const okBtn = document.getElementById('confirmOkBtn');
    okBtn.textContent  = variant === 'danger' ? '中断する' : '実行する';
    okBtn.className    = 'flex-1 text-white text-sm font-bold py-2.5 rounded-xl transition '
      + (variant === 'danger' ? 'bg-red-500 hover:bg-red-400' : 'bg-navy hover:opacity-90');
    state._confirmCb = cb;
    const modal = document.getElementById('confirmModal');
    modal.classList.remove('hidden'); modal.classList.add('flex');
    trapFocus(modal);
  }

  function closeConfirmModal() {
    const modal = document.getElementById('confirmModal');
    modal.classList.add('hidden'); modal.classList.remove('flex');
    state._confirmCb = null;
  }

  document.getElementById('confirmOkBtn').addEventListener('click', () => {
    const cb = state._confirmCb;
    closeConfirmModal();
    if (cb) cb();
  });

  // ══════════════════════════════════════
  // フォーカストラップ
  // ══════════════════════════════════════
  function trapFocus(modal) {
    const focusable = modal.querySelectorAll('button, input, textarea, select, [tabindex]:not([tabindex="-1"])');
    if (!focusable.length) return;
    focusable[0].focus();
    modal.addEventListener('keydown', function handler(e) {
      if (e.key !== 'Tab') return;
      const first = focusable[0], last = focusable[focusable.length - 1];
      if (e.shiftKey ? document.activeElement === first : document.activeElement === last) {
        e.preventDefault();
        (e.shiftKey ? last : first).focus();
      }
      if (!modal.classList.contains('flex')) modal.removeEventListener('keydown', handler);
    });
  }

  // Escape キーでモーダルを閉じる
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (document.getElementById('settingsModal').classList.contains('flex')) closeSettings();
    if (document.getElementById('confirmModal').classList.contains('flex'))  closeConfirmModal();
  });

  // ══════════════════════════════════════
  // Toast
  // ══════════════════════════════════════
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // 初期化
  updateStandbySummary();
</script>
