name: 週次報告 自動ドラフト生成

on:
  # 毎週金曜 17:00（JST = UTC+9）に自動実行
  schedule:
    - cron: '0 8 * * 5'

  # 手動実行も可能
  workflow_dispatch:
    inputs:
      week_offset:
        description: '対象週オフセット（0=今週, -1=先週）'
        required: false
        default: '0'
        type: number

jobs:
  generate-draft:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 週次報告ドラフトを生成・保存
        env:
          MS_TENANT_ID:         ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:         ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET:     ${{ secrets.MS_CLIENT_SECRET }}
          REDMINE_URL:          ${{ secrets.REDMINE_URL }}
          REDMINE_API_KEY:      ${{ secrets.REDMINE_API_KEY }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          BOSS_EMAIL:           ${{ secrets.BOSS_EMAIL }}
          BOSS_EMAIL_SUBJECT:   ${{ secrets.BOSS_EMAIL_SUBJECT }}
          WEEK_OFFSET:          ${{ inputs.week_offset || '0' }}
        run: python scripts/generate_draft.py
